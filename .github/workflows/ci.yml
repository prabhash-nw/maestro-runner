name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Check golangci-lint version
        run: echo "golangci-lint version:" && golangci-lint --version || echo "golangci-lint not yet installed"

      - name: Install golangci-lint v2.11.3
        run: |
          mkdir -p $HOME/bin
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $HOME/bin v2.11.3
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Lint
        run: golangci-lint run ./... --output.json.path=/tmp/lint-report.json && echo "Lint passed"

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  test-python:
    name: Test Python Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: client/python
        run: |
          python3 -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Run unit tests
        working-directory: client/python
        # --noconftest skips conftest.py so the autouse _track_client fixture
        # (which requires a real maestro-runner server + device) is not loaded.
        # Unit tests use their own requests_mock fixtures and need no server.
        run: .venv/bin/python -m pytest tests/test_client.py tests/test_models.py -v --noconftest

      - name: Lint
        working-directory: client/python
        run: .venv/bin/ruff check maestro_runner tests

      - name: Type check
        working-directory: client/python
        run: .venv/bin/mypy maestro_runner

  test-typescript:
    name: Test TypeScript Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/typescript/package-lock.json

      - name: Install dependencies
        working-directory: client/typescript
        run: npm ci

      - name: Run unit tests
        working-directory: client/typescript
        run: npm run test:unit

      - name: Lint
        working-directory: client/typescript
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-go, test-python, test-typescript]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true

      - name: Build
        run: go build -v ./...
